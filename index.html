<script>
// 10초 후에도 로딩 화면이면 에러 표시
setTimeout(function(){
    var ls=document.getElementById('loading-screen');
    if(ls&&!ls.classList.contains('hidden')){
        var err=document.getElementById('load-error');
        if(err){
            err.style.display='block';
            err.innerHTML='⚠️ 페이지 로딩에 시간이 걸려요.<br>인터넷 연결을 확인하거나 새로고침 해주세요.<br><br>(React/Babel CDN 로딩 대기 중)';
        }
    }
},10000);
</script>

<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

/* ===== SOUND ENGINE ===== */
const SFX={
    _ctx:null,
    _getCtx(){if(!this._ctx)try{this._ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return this._ctx},
    play(type){
        try{
            const c=this._getCtx();if(!c)return;
            if(c.state==='suspended')c.resume();
            const now=c.currentTime;
            switch(type){
                case'click':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(880,now);g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.1);o.start(now);o.stop(now+.1);break}
                case'place':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.setValueAtTime(440,now);o.frequency.exponentialRampToValueAtTime(220,now+.2);g.gain.setValueAtTime(.1,now);g.gain.exponentialRampToValueAtTime(.001,now+.25);o.start(now);o.stop(now+.25);break}
                case'splash':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(100,now+.4);g.gain.setValueAtTime(.06,now);g.gain.exponentialRampToValueAtTime(.001,now+.4);o.start(now);o.stop(now+.4);break}
                case'success':{[523,659,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(f,now+i*.12);g.gain.setValueAtTime(.12,now+i*.12);g.gain.exponentialRampToValueAtTime(.001,now+i*.12+.3);o.start(now+i*.12);o.stop(now+i*.12+.3)});break}
                case'error':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.setValueAtTime(180,now);g.gain.setValueAtTime(.06,now);g.gain.exponentialRampToValueAtTime(.001,now+.3);o.start(now);o.stop(now+.3);break}
                case'achievement':{[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(f,now+i*.15);g.gain.setValueAtTime(.15,now+i*.15);g.gain.exponentialRampToValueAtTime(.001,now+i*.15+.4);o.start(now+i*.15);o.stop(now+i*.15+.4)});break}
                case'fanfare':{const notes=[523,659,784,659,784,1047];notes.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(f,now+i*.18);g.gain.setValueAtTime(.15,now+i*.18);g.gain.exponentialRampToValueAtTime(.001,now+i*.18+.35);o.start(now+i*.18);o.stop(now+i*.18+.35)});break}
                case'reset':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(300,now+.15);g.gain.setValueAtTime(.07,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);o.start(now);o.stop(now+.15);break}
                case'dive':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(800,now);o.frequency.exponentialRampToValueAtTime(200,now+.4);g.gain.setValueAtTime(.08,now);g.gain.exponentialRampToValueAtTime(.001,now+.4);o.start(now);o.stop(now+.4);break}
                case'camera':{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.setValueAtTime(1500,now);o.frequency.exponentialRampToValueAtTime(400,now+.15);g.gain.setValueAtTime(.15,now);g.gain.exponentialRampToValueAtTime(.001,now+.15);o.start(now);o.stop(now+.15);break}
                case'mystery':{[392,494,587,494].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(f,now+i*.2);g.gain.setValueAtTime(.1,now+i*.2);g.gain.exponentialRampToValueAtTime(.001,now+i*.2+.4);o.start(now+i*.2);o.stop(now+i*.2+.4)});break}
            }
        }catch(e){}
    }
};

/* ===== UTILITY: viewport detection ===== */
const useViewport=()=>{
    const[w,setW]=useState(typeof window!=='undefined'?window.innerWidth:1024);
    useEffect(()=>{
        const onR=()=>setW(window.innerWidth);
        window.addEventListener('resize',onR);
        return()=>window.removeEventListener('resize',onR);
    },[]);
    return{w,isMobile:w<640,isTablet:w>=640&&w<1024,isDesktop:w>=1024};
};

/* ===== TAB 1: EXPLORE - 미지의 금속 탐정 ===== */
const ExperimentLab=({onAchieve,isMobile})=>{
    const[selectedObj,setSelectedObj]=useState(null);
    const[scaleValue,setScaleValue]=useState(0);
    const[onScale,setOnScale]=useState(null);
    const[inCylinder,setInCylinder]=useState(null);
    const[temperature,setTemperature]=useState(20);
    const[showTempWarn,setShowTempWarn]=useState(false);
    const[tempWarnShown,setTempWarnShown]=useState(false);
    const baseWaterVolume=50.0;

    const[completed,setCompleted]=useState({});
    const[userInputs,setUserInputs]=useState({});
    const[inputErrors,setInputErrors]=useState({});

    // Step gating: 0=select obj, 1=measure mass, 2=input mass, 3=measure volume, 4=input volume → next obj
    const[currentStep,setCurrentStep]=useState(0);

    const[quizA,setQuizA]=useState('');
    const[quizB,setQuizB]=useState('');
    const[quizResult,setQuizResult]=useState(null);
    const[showConclusion,setShowConclusion]=useState(false);

    const currentWaterVolume=baseWaterVolume+(baseWaterVolume*0.0004*(temperature-20));
    const totalVolume=currentWaterVolume+(inCylinder?inCylinder.volume:0);

    // 온도 변경 시 경고 (한 번만)
    const handleTempChange=(v)=>{
        setTemperature(v);
        if(!tempWarnShown&&Math.abs(v-20)>=10){
            setShowTempWarn(true);
            setTempWarnShown(true);
            SFX.play('mystery');
        }
    };

    const getUnlockedIndex=()=>{
        for(let i=0;i<MAT_ORDER.length;i++){
            const c=completed[MAT_ORDER[i]];
            const inp=userInputs[MAT_ORDER[i]];
            if(!c||!c.mass||!c.volume||!inp?.mass||!inp?.volume) return i;
        }
        return MAT_ORDER.length;
    };
    const unlockedIdx=getUnlockedIndex();
    const isUnlocked=(matId)=>{
        const idx=MAT_ORDER.indexOf(matId);
        return idx<=unlockedIdx;
    };
    const isCurrent=(matId)=>MAT_ORDER.indexOf(matId)===unlockedIdx;

    const handleSelect=(obj)=>{
        if(inCylinder||onScale)return;
        if(!isUnlocked(obj.id))return;
        SFX.play('click');
        setSelectedObj(obj);
        if(currentStep===0)setCurrentStep(1);
    };

    const placeOnScale=()=>{
        if(!selectedObj||completed[selectedObj.id]?.mass)return;
        SFX.play('place');
        const m=selectedObj;
        setOnScale(m);
        setSelectedObj(null);
        setTimeout(()=>setScaleValue(m.mass.toFixed(2)),400);
        setCompleted(p=>({...p,[m.id]:{...p[m.id],mass:true}}));
        setCurrentStep(2);
    };

    const placeInCylinder=()=>{
        if(!selectedObj)return;
        SFX.play('splash');
        const m=selectedObj;
        setInCylinder(m);
        setSelectedObj(null);
        setCompleted(p=>({...p,[m.id]:{...p[m.id],volume:true}}));
        setCurrentStep(4);
    };

    const resetExperiment=()=>{
        SFX.play('reset');
        setOnScale(null);setInCylinder(null);setSelectedObj(null);setScaleValue(0);
    };

    const handleInput=(matId,field,val)=>{
        setUserInputs(p=>({...p,[matId]:{...p[matId],[field]:val}}));
        setInputErrors(p=>{const n={...p};delete n[`${matId}_${field}`];return n});
    };

    const validateInput=(matId,field)=>{
        const mat=MATERIALS.find(m=>m.id===matId);
        const val=parseFloat(userInputs[matId]?.[field]||'');
        const actual=field==='mass'?mat.mass:mat.volume;
        if(isNaN(val)){setInputErrors(p=>({...p,[`${matId}_${field}`]:'숫자를 입력하세요'}));return false}
        if(Math.abs(val-actual)>0.5){setInputErrors(p=>({...p,[`${matId}_${field}`]:'다시 측정 결과 확인!'}));SFX.play('error');return false}
        SFX.play('success');
        if(field==='mass'&&currentStep===2)setCurrentStep(3);
        if(field==='volume'&&currentStep===4){
            // 다음 물질로 자동 이동을 위해 도구 초기화
            setTimeout(()=>{setOnScale(null);setInCylinder(null);setScaleValue(0);setCurrentStep(0)},400);
        }
        return true;
    };

    const getUserDensity=(matId)=>{
        const inp=userInputs[matId];
        if(!inp?.mass||!inp?.volume)return null;
        const m=parseFloat(inp.mass),v=parseFloat(inp.volume);
        if(isNaN(m)||isNaN(v)||v===0)return null;
        return(m/v).toFixed(2);
    };

    const allBaseComplete=['iron_s','iron_l','alu_s','alu_l'].every(id=>getUserDensity(id)!==null);
    const mysteryComplete=['mystery_a','mystery_b'].every(id=>getUserDensity(id)!==null);

    const handleQuizSubmit=()=>{
        if(quizA==='금'&&quizB==='구리'){
            SFX.play('achievement');
            setQuizResult('correct');
            onAchieve('explore');
        }else{
            SFX.play('error');
            setQuizResult('wrong');
        }
    };

    const stepGuide=()=>{
        const cur=MATERIALS[unlockedIdx];
        if(!cur)return{title:"🎉 모든 물질 측정 완료!",text:"미지의 물질 정체를 추리해보세요!",icon:"🏆"};
        const c=completed[cur.id]||{};
        const inp=userInputs[cur.id]||{};
        if(!c.mass)return{title:`STEP ${unlockedIdx*4+1}: ${cur.code} 선택`,text:`'${cur.name}'을(를) 클릭하고 '⚖️ 저울에 올리기'를 눌러 질량을 측정하세요.`,icon:"👆"};
        if(!inp.mass)return{title:`STEP ${unlockedIdx*4+2}: 질량 기록`,text:`저울에 표시된 ${cur.name}의 질량을 측정 결과표에 입력하세요.`,icon:"✏️"};
        if(!c.volume)return{title:`STEP ${unlockedIdx*4+3}: 부피 측정`,text:`'실험 도구 비우기' 후, ${cur.name}을(를) 다시 선택해 '💧 실린더에 넣기'를 누르세요.`,icon:"💧"};
        if(!inp.volume)return{title:`STEP ${unlockedIdx*4+4}: 부피 기록`,text:`실린더 눈금 변화(${cur.volume}mL)를 측정 결과표에 입력하세요!`,icon:"📐"};
        return{title:"다음 물질로!",text:"다음 증거물을 측정해보세요.",icon:"➡️"};
    };
    const guide=stepGuide();

    return(
        <div className="flex flex-col xl:flex-row gap-3 p-3">
            {showTempWarn&&<TempWarningModal onClose={()=>setShowTempWarn(false)} temperature={temperature}/>}

            {/* Left: Lab */}
            <div className="flex-1 bg-white rounded-2xl shadow-lg p-4 flex flex-col relative">
                <div className="flex flex-wrap justify-between items-center mb-3 gap-2">
                    <h2 className="text-sm sm:text-base font-semibold text-gray-800 flex items-center gap-2 detective-font">
                        <Magnify className="text-amber-600" size={20}/>
                        파일 1: 미지의 금속 정체 찾기
                    </h2>
                    <div className="bg-orange-50 p-1.5 rounded-lg border border-orange-200 flex items-center gap-2">
                        <Thermometer className="text-orange-500" size={16}/>
                        <div className="flex flex-col">
                            <span className="text-[10px] text-orange-800 font-semibold">물 온도: {temperature}°C</span>
                            <input type="range" min="0" max="80" value={temperature} onChange={e=>handleTempChange(parseInt(e.target.value))} className="w-24 sm:w-28"/>
                        </div>
                    </div>
                </div>

                {/* Guide */}
                <div className="bg-amber-50 border-2 border-amber-300 rounded-xl p-2.5 mb-3 fade-in relative" key={`${unlockedIdx}-${guide.title}`}>
                    <div className="tape tape-tl"></div>
                    <div className="flex items-start gap-2">
                        <span className="text-2xl">{guide.icon}</span>
                        <div>
                            <h4 className="font-semibold text-amber-900 text-xs detective-font">🔍 {guide.title}</h4>
                            <p className="text-amber-800 text-[11px] leading-relaxed">{guide.text}</p>
                        </div>
                    </div>
                </div>

                {/* Cylinder reading tip */}
                <div className="bg-blue-50 border border-blue-200 rounded-lg p-2 mb-3 text-[10px] text-blue-900 flex items-start gap-2">
                    <span className="text-base">📏</span>
                    <div>
                        <strong>실린더 읽는 법:</strong> 오목한 면(메니스커스)의 가장 낮은 부분을 읽으세요. 넣기 전(50mL)과 넣은 후 눈금의 차이가 물질의 부피입니다.
                    </div>
                </div>

                {/* Instruments */}
                <div className="flex-1 flex flex-row justify-around items-end gap-4 sm:gap-6 pb-2">
                    {/* Scale */}

/* ===== TAB 2: 간이 밀도탑 - 밀도 음료 만들기 ===== */
const DensityTower=({onAchieve,onSaveDrink})=>{
    const[stack,setStack]=useState([]);
    const[isPouring,setIsPouring]=useState(false);
    const[completed,setCompleted]=useState(false);
    const[drinkName,setDrinkName]=useState('');
    const[stickers,setStickers]=useState([]);
    const[draggedSticker,setDraggedSticker]=useState(null);
    const[showCertModal,setShowCertModal]=useState(false);
    const[errorMsg,setErrorMsg]=useState('');
    const[selectedGlass,setSelectedGlass]=useState(GLASSES[0]);
    // 시럽 순서를 한 번만 셔플 (마운트 시)
    const[shuffledSyrups]=useState(()=>{
        const arr=[...SYRUPS];
        for(let i=arr.length-1;i>0;i--){
            const j=Math.floor(Math.random()*(i+1));
            [arr[i],arr[j]]=[arr[j],arr[i]];
        }
        return arr;
    });
    const cupRef=useRef(null);

    const addSyrup=(syrup)=>{
        if(isPouring||completed)return;
        if(stack.find(s=>s.id===syrup.id))return;
        if(stack.length>0){
            const last=stack[stack.length-1];
            if(syrup.density>=last.density){
                SFX.play('error');
                setErrorMsg('❌ '+syrup.name+'('+syrup.density+')은 '+last.name+'('+last.density+')보다 밀도가 커요! 위에 쌓으려면 밀도가 더 작아야 합니다.');
                setTimeout(()=>setErrorMsg(''),3000);
                return;
            }
        }
        SFX.play('splash');
        setIsPouring(true);
        setStack(prev=>[...prev,syrup]);
        setTimeout(()=>setIsPouring(false),700);
    };

    const resetCup=()=>{
        SFX.play('reset');
        setStack([]);setCompleted(false);setErrorMsg('');setStickers([]);setDrinkName('');
    };

    const finishDrink=()=>{
        if(stack.length<3){
            setErrorMsg('최소 3개 이상의 시럽을 쌓아주세요!');
            SFX.play('error');
            setTimeout(()=>setErrorMsg(''),2500);
            return;
        }
        SFX.play('achievement');
        setCompleted(true);
        onAchieve('tower');
    };

    const addSticker=(emoji)=>{
        if(!completed)return;
        SFX.play('click');
        setStickers(prev=>[...prev,{id:Date.now()+Math.random(),emoji,x:50+Math.random()*30-15,y:30+Math.random()*40}]);
    };
    const removeSticker=(id)=>{
        SFX.play('click');
        setStickers(prev=>prev.filter(s=>s.id!==id));
    };
    const onPointerDown=(e,id)=>{e.preventDefault();setDraggedSticker(id);};
    const onPointerMove=(e)=>{
        if(!draggedSticker||!cupRef.current)return;
        const rect=cupRef.current.getBoundingClientRect();
        const clientX=e.clientX||(e.touches&&e.touches[0]?.clientX);
        const clientY=e.clientY||(e.touches&&e.touches[0]?.clientY);
        if(clientX==null||clientY==null)return;
        const x=((clientX-rect.left)/rect.width)*100;
        const y=((clientY-rect.top)/rect.height)*100;
        setStickers(prev=>prev.map(s=>s.id===draggedSticker?{...s,x:Math.max(5,Math.min(90,x)),y:Math.max(5,Math.min(90,y))}:s));
    };
    const onPointerUp=()=>setDraggedSticker(null);

    useEffect(()=>{
        if(!draggedSticker)return;
        window.addEventListener('pointermove',onPointerMove);
        window.addEventListener('pointerup',onPointerUp);
        return()=>{window.removeEventListener('pointermove',onPointerMove);window.removeEventListener('pointerup',onPointerUp)};
    },[draggedSticker]);

    useEffect(()=>{
        if(completed&&drinkName){
            onSaveDrink({name:drinkName,glass:selectedGlass.name,stack:stack.map(s=>({id:s.id,name:s.name,color:s.color,gradFrom:s.gradFrom,gradTo:s.gradTo,density:s.density,emoji:s.emoji})),stickers});
        }
    },[completed,drinkName,stack,stickers,selectedGlass]);

    const totalLayers=stack.length;

    // 잔 모양별 SVG 마스크 (clipPath)
    const renderGlassContent=()=>{
        const g=selectedGlass;
        const layerHeight=stack.length>0?(85/Math.max(stack.length,4)):0;
        return(
            <svg width={g.width} height={g.height} viewBox={'0 0 '+g.width+' '+g.height} style={{display:'block'}}>
                <defs>
                    <clipPath id="glass-clip">
                        {g.shape==='cup'&&<path d={'M 15 30 L 15 '+(g.height-20)+' Q 15 '+(g.height-5)+' 30 '+(g.height-5)+' L '+(g.width-30)+' '+(g.height-5)+' Q '+(g.width-15)+' '+(g.height-5)+' '+(g.width-15)+' '+(g.height-20)+' L '+(g.width-15)+' 30 Z'}/>}
                        {g.shape==='highball'&&<path d={'M 20 20 L 20 '+(g.height-15)+' Q 20 '+(g.height-5)+' 30 '+(g.height-5)+' L '+(g.width-30)+' '+(g.height-5)+' Q '+(g.width-20)+' '+(g.height-5)+' '+(g.width-20)+' '+(g.height-15)+' L '+(g.width-20)+' 20 Z'}/>}
                        {g.shape==='wine'&&<path d={'M 25 20 Q 10 100 30 '+(g.height-100)+' L '+(g.width-30)+' '+(g.height-100)+' Q '+(g.width-10)+' 100 '+(g.width-25)+' 20 Z'}/>}
                        {g.shape==='martini'&&<path d={'M 10 20 L '+(g.width-10)+' 20 L '+(g.width/2+10)+' '+(g.height-100)+' L '+(g.width/2-10)+' '+(g.height-100)+' Z'}/>}
                        {g.shape==='rocks'&&<path d={'M 10 15 L 10 '+(g.height-10)+' L '+(g.width-10)+' '+(g.height-10)+' L '+(g.width-10)+' 15 Z'}/>}
                    </clipPath>
                    {stack.map((s,idx)=>(
                        <linearGradient key={s.id+'-'+idx} id={'grad-'+s.id+'-'+idx} x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stopColor={s.gradFrom} stopOpacity="0.95"/>
                            <stop offset="100%" stopColor={s.gradTo} stopOpacity="0.95"/>
                        </linearGradient>
                    ))}
                </defs>

                {/* 잔 외곽 (밝은 윤곽선) */}
                {g.shape==='cup'&&<path d={'M 15 30 L 15 '+(g.height-20)+' Q 15 '+(g.height-5)+' 30 '+(g.height-5)+' L '+(g.width-30)+' '+(g.height-5)+' Q '+(g.width-15)+' '+(g.height-5)+' '+(g.width-15)+' '+(g.height-20)+' L '+(g.width-15)+' 30'} fill="rgba(255,255,255,0.15)" stroke="#94a3b8" strokeWidth="3"/>}
                {g.shape==='highball'&&<path d={'M 20 20 L 20 '+(g.height-15)+' Q 20 '+(g.height-5)+' 30 '+(g.height-5)+' L '+(g.width-30)+' '+(g.height-5)+' Q '+(g.width-20)+' '+(g.height-5)+' '+(g.width-20)+' '+(g.height-15)+' L '+(g.width-20)+' 20'} fill="rgba(255,255,255,0.15)" stroke="#94a3b8" strokeWidth="3"/>}
                {g.shape==='wine'&&<>
                    <path d={'M 25 20 Q 10 100 30 '+(g.height-100)+' L '+(g.width-30)+' '+(g.height-100)+' Q '+(g.width-10)+' 100 '+(g.width-25)+' 20'} fill="rgba(255,255,255,0.15)" stroke="#94a3b8" strokeWidth="3"/>
                    {/* 다리 */}
                    <rect x={g.width/2-2} y={g.height-100} width="4" height="70" fill="#94a3b8"/>
                    <ellipse cx={g.width/2} cy={g.height-15} rx="40" ry="6" fill="#94a3b8"/>
                </>}
                {g.shape==='martini'&&<>
                    <path d={'M 10 20 L '+(g.width-10)+' 20 L '+(g.width/2+10)+' '+(g.height-100)+' L '+(g.width/2-10)+' '+(g.height-100)+' Z'} fill="rgba(255,255,255,0.15)" stroke="#94a3b8" strokeWidth="3"/>
                    <rect x={g.width/2-2} y={g.height-100} width="4" height="70" fill="#94a3b8"/>
                    <ellipse cx={g.width/2} cy={g.height-15} rx="35" ry="6" fill="#94a3b8"/>
                </>}
                {g.shape==='rocks'&&<path d={'M 10 15 L 10 '+(g.height-10)+' L '+(g.width-10)+' '+(g.height-10)+' L '+(g.width-10)+' 15'} fill="rgba(255,255,255,0.15)" stroke="#94a3b8" strokeWidth="3"/>}

                {/* 시럽 층 (clipPath 안에 그림) */}
                <g clipPath="url(#glass-clip)">
                    {stack.map((s,idx)=>{
                        const totalH=g.shape==='wine'||g.shape==='martini'?(g.height-120):(g.height-30);
                        const layerH=Math.max(totalH*0.85/Math.max(stack.length,4),28);
                        const baseY=g.shape==='wine'||g.shape==='martini'?(g.height-100):(g.height-10);
                        const y=baseY-layerH*(idx+1);
                        const yPrev=baseY-layerH*idx;
                        return(
                            <g key={s.id+'-'+idx} className="fade-in">
                                <rect x="0" y={y} width={g.width} height={layerH} fill={'url(#grad-'+s.id+'-'+idx+')'}/>
                                {/* 윗면 광택 */}
                                <rect x="0" y={y} width={g.width} height="3" fill="white" opacity="0.4"/>
                                {/* 라벨 */}
                                <text x={g.width/2} y={y+layerH/2+4} textAnchor="middle" fill={s.textColor} fontSize="10" fontWeight="500" style={{fontFamily:"'Noto Sans KR'"}}>{s.emoji} {s.name}</text>
                            </g>
                        );
                    })}
                </g>

                {/* 잔 광택 효과 */}
                <ellipse cx={g.width*0.3} cy={50} rx="6" ry="20" fill="white" opacity="0.4"/>
            </svg>
        );
    };

    return(
        <div className="flex flex-col h-full p-3 gap-3 bg-gradient-to-br from-rose-50 via-amber-50 to-purple-50 overflow-y-auto">

                <h2 className="text-base sm:text-lg font-semibold text-purple-900 flex items-center justify-center gap-2">
                    <Droplets className="text-purple-600"/> 파일 2: 간이 밀도탑 쌓기 (나만의 밀도 음료)
                </h2>
                <p className="text-purple-700 text-xs mt-1">💡 시럽을 순서 없이 진열해 두었어요. <strong>어떤 게 먼저 들어가야 할지 생각해보세요!</strong></p>
            </div>

            {/* 잔 선택 */}
            <div className="bg-white rounded-2xl shadow p-2.5 border border-purple-200 max-w-2xl mx-auto w-full">
                <div className="text-xs font-semibold text-purple-900 mb-1.5 px-1">🥃 잔 모양 선택:</div>
                <div className="flex gap-1.5 overflow-x-auto pb-1">
                    {GLASSES.map(g=>(
                        <button key={g.id} onClick={()=>{if(stack.length>0){if(!confirm('잔을 바꾸면 쌓은 시럽이 초기화됩니다. 계속할까요?'))return;resetCup()}SFX.play('click');setSelectedGlass(g)}} className={'flex-shrink-0 flex flex-col items-center px-2.5 py-1.5 rounded-lg border-2 transition-all '+(selectedGlass.id===g.id?'bg-purple-100 border-purple-500 ring-2 ring-purple-300':'bg-white border-gray-200 hover:border-purple-300')}>
                            <span className="text-xl">{g.emoji}</span>
                            <span className="text-[10px] font-medium text-gray-700 mt-0.5">{g.name}</span>
                        </button>
                    ))}
                </div>
            </div>

            <div className="flex flex-col lg:flex-row gap-3 items-start justify-center">
                {/* LEFT: 시럽 진열대 */}
                <div className="bg-white rounded-2xl shadow-lg p-3 w-full lg:w-72 border-2 border-purple-200">
                    <h3 className="font-semibold text-purple-800 mb-2 text-sm flex items-center gap-1">🧪 시럽 진열대 <span className="text-[10px] text-gray-500 font-normal">(랜덤 배치)</span></h3>
                    <div className="space-y-1.5">
                        {shuffledSyrups.map(s=>{
                            const used=stack.find(x=>x.id===s.id);
                            return(
                                <button key={s.id} onClick={()=>addSyrup(s)} disabled={used||completed} className={'w-full flex items-center gap-2 p-2 rounded-lg border-2 transition-all text-left relative overflow-hidden '+(used?'opacity-40 bg-gray-100 border-gray-200 cursor-not-allowed':'hover:scale-[1.02] hover:shadow-md bg-white border-gray-200')}>
                                    {/* 그라데이션 미리보기 */}
                                    <div className="absolute left-0 top-0 bottom-0 w-1.5" style={{background:'linear-gradient(to bottom,'+s.gradFrom+','+s.gradTo+')'}}></div>
                                    <span className="text-xl ml-1">{s.emoji}</span>
                                    <div className="flex-1 min-w-0">
                                        <div className="text-xs font-medium text-gray-800 truncate">{s.name}</div>
                                        <div className="text-[10px] text-gray-500">밀도: <span className="font-mono font-semibold text-purple-700">{s.density}</span> g/mL</div>
                                    </div>
                                    {used&&<span className="text-[10px] text-green-600 font-semibold">✓</span>}
                                </button>
                            );
                        })}
                    </div>
                    <button onClick={resetCup} className="mt-2 w-full bg-red-100 text-red-700 py-1.5 rounded-lg text-xs font-medium border border-red-200 hover:bg-red-200 flex items-center justify-center gap-1"><RefreshCcw size={12}/> 잔 비우기</button>
                </div>

                {/* CENTER: 잔 */}
                <div className="flex flex-col items-center w-full lg:w-auto">
                    {completed&&(
                        <div className="mb-3 bg-white rounded-xl p-3 shadow-lg border-2 border-amber-300 w-64">
                            <label className="text-xs font-medium text-amber-800">🍹 나만의 음료 이름:</label>
                            <input type="text" value={drinkName} onChange={e=>setDrinkName(e.target.value)} placeholder="예) 무지개 폭포" maxLength={20} className="w-full mt-1 px-2 py-1.5 border-2 border-amber-300 rounded text-sm font-medium text-center focus:outline-none focus:border-amber-500"/>
                        </div>
                    )}

                    <div ref={cupRef} className="relative" style={{width:selectedGlass.width+'px',height:selectedGlass.height+'px'}}>
                        {renderGlassContent()}
                        {stack.length===0&&<div className="absolute inset-0 flex items-center justify-center text-gray-400 text-xs pointer-events-none">시럽을 골라보세요</div>}
                        {/* 스티커 */}
                        {stickers.map(s=>(
                            <div key={s.id} onPointerDown={e=>onPointerDown(e,s.id)} onDoubleClick={()=>removeSticker(s.id)} className="sticker absolute" style={{left:s.x+'%',top:s.y+'%',transform:'translate(-50%,-50%)',zIndex:50,touchAction:'none'}} title="더블클릭으로 삭제">{s.emoji}</div>
                        ))}
                        {completed&&(selectedGlass.shape==='cup'||selectedGlass.shape==='highball'||selectedGlass.shape==='rocks')&&<div className="absolute -top-8 left-1/2 w-2 h-24 bg-gradient-to-b from-pink-400 to-pink-600 rounded-full transform -translate-x-1/2 -rotate-12 shadow"></div>}
                        <div className="absolute -top-2 -right-2 bg-purple-600 text-white text-[10px] px-2 py-0.5 rounded-full font-medium shadow">{totalLayers}/{SYRUPS.length}</div>
                    </div>

                    {/* 컵 받침 */}
                    <div className="w-48 h-3 bg-gradient-to-r from-gray-400 via-gray-300 to-gray-400 rounded-full mt-1 shadow-md"></div>

                    {errorMsg&&<div className="mt-2 bg-red-100 border border-red-300 text-red-800 px-3 py-2 rounded-lg text-xs font-medium max-w-xs text-center shake">{errorMsg}</div>}

                    {!completed&&stack.length>=3&&<button onClick={finishDrink} className="mt-3 bg-gradient-to-r from-amber-500 to-pink-500 text-white px-6 py-2.5 rounded-full font-semibold text-sm shadow-lg hover:scale-105 transition-transform">✨ 밀도 음료 완성!</button>}
                    {completed&&<div className="mt-3 bg-green-100 border-2 border-green-400 px-4 py-2 rounded-full text-green-800 font-medium text-sm">🎉 완성! 스티커로 꾸며보세요!</div>}
                </div>

                {/* RIGHT */}
                <div className="w-full lg:w-64 flex flex-col gap-3">
                    <div className="bg-white rounded-2xl shadow-lg p-3 border-2 border-purple-200">
                        <h3 className="font-semibold text-purple-800 text-sm mb-2">📋 쌓은 순서 (아래→위)</h3>
                        {stack.length===0?
                            <p className="text-xs text-gray-400 text-center py-3">아직 시럽이 없어요</p>
                            :
                            <div className="space-y-1">
                                {[...stack].reverse().map((s,i)=>(
                                    <div key={i} className="flex items-center gap-2 text-[10px] p-1 rounded" style={{background:'linear-gradient(to right,'+s.gradFrom+'30,'+s.gradTo+'30)'}}>
                                        <span className="w-4 h-4 rounded-full border border-gray-300" style={{background:'linear-gradient(135deg,'+s.gradFrom+','+s.gradTo+')'}}></span>
                                        <span className="flex-1">{s.emoji} {s.name}</span>
                                        <span className="font-mono font-semibold text-purple-700">{s.density}</span>
                                    </div>
                                ))}
                            </div>
                        }
                    </div>

                    {completed&&(
                        <div className="bg-white rounded-2xl shadow-lg p-3 border-2 border-amber-300 fade-in">
                            <h3 className="font-semibold text-amber-800 text-sm mb-2">🎨 스티커 꾸미기</h3>
                            <p className="text-[10px] text-gray-500 mb-2">탭하여 추가 · 드래그 이동 · 더블클릭 삭제</p>
                            <div className="grid grid-cols-5 gap-1">
                                {STICKERS.map(emoji=>(
                                    <button key={emoji} onClick={()=>addSticker(emoji)} className="text-2xl hover:scale-125 transition-transform">{emoji}</button>
                                ))}
                            </div>
                        </div>
                    )}

                    {completed&&drinkName&&(
                        <button onClick={()=>{SFX.play('fanfare');setShowCertModal(true)}} className="bg-gradient-to-r from-amber-500 to-amber-700 text-white p-3 rounded-2xl shadow-lg font-semibold text-sm hover:scale-105 transition-transform flex items-center justify-center gap-2">
                            <Award size={18}/> 제조 자격증 발급!
                        </button>
                    )}
                </div>
            </div>

            {showCertModal&&<DrinkCertModal onClose={()=>setShowCertModal(false)} drinkName={drinkName} stack={stack} stickers={stickers} glassName={selectedGlass.name}/>}
        </div>
    );
};

/* ===== TAB 3: DIVER - 실시간 반응 + 인증샷 ===== */
const DiverGame=({onAchieve,onSavePhoto})=>{
    const[weights,setWeights]=useState(0);
    const[showFlash,setShowFlash]=useState(false);
    const[photoTaken,setPhotoTaken]=useState(false);

    // 납 벨트 수에 따른 depth와 상태 즉시 계산
    const calc=(w)=>{
        if(w===0)return{depth:10,status:'surface_float'};
        if(w===1)return{depth:25,status:'shallow'};
        if(w===2)return{depth:45,status:'neutral'};// 수심 15m 지점
        if(w===3)return{depth:62,status:'deep'};
        if(w===4)return{depth:75,status:'very_deep'};
        return{depth:90,status:'floor'};
    };
    const{depth,status}=calc(weights);
    const at15m=status==='neutral';

    const changeWeights=(delta)=>{
        const next=Math.max(0,Math.min(5,weights+delta));
        if(next===weights)return;
        SFX.play(delta>0?'place':'click');
        setWeights(next);
        setPhotoTaken(false);
        // 가라앉을 때 dive 사운드
        if(delta>0)setTimeout(()=>SFX.play('dive'),200);
    };

    const setWeightsTo=(w)=>{
        if(w===weights)return;
        SFX.play('click');
        setWeights(w);
        setPhotoTaken(false);
    };

    const takePhoto=()=>{
        if(!at15m)return;
        SFX.play('camera');
        setShowFlash(true);
        setTimeout(()=>setShowFlash(false),300);
        setPhotoTaken(true);
        onAchieve('diver');
        onSavePhoto({timestamp:new Date().toLocaleString('ko-KR'),depth:'15m',weights});
    };

    // 첫 도달 시 자동 성공 알림 (인증샷 버튼만 활성화)
    useEffect(()=>{
        if(at15m&&!photoTaken)SFX.play('mystery');
    },[at15m]);

    const getStatusInfo=()=>{
        switch(status){
            case'surface_float':return{text:"밀도가 작아 물 위에 떠 있어요. 납이 더 필요합니다!",color:"text-sky-700",bg:"bg-sky-50 border-sky-300",emoji:"🏊"};
            case'shallow':return{text:"가라앉기 시작! 하지만 수심 15m엔 도달하지 못했어요.",color:"text-blue-700",bg:"bg-blue-50 border-blue-300",emoji:"⬇️"};
            case'neutral':return{text:"🎯 명중! 수심 15m 지점에 안정적으로 멈췄어요! 인증샷을 찍어요!",color:"text-green-700",bg:"bg-green-50 border-green-400",emoji:"✅"};
            case'deep':return{text:"너무 무거워요! 15m를 지나 깊이 내려갑니다.",color:"text-orange-700",bg:"bg-orange-50 border-orange-300",emoji:"⚠️"};
            case'very_deep':return{text:"위험! 너무 깊이 가라앉고 있어요!",color:"text-red-600",bg:"bg-red-50 border-red-300",emoji:"🚨"};
            case'floor':return{text:"바닥에 닿았습니다! 납이 너무 많아요!",color:"text-red-700",bg:"bg-red-50 border-red-400",emoji:"💥"};
            default:return{text:"납 벨트를 조절해 수심 15m에 멈춰보세요!",color:"text-gray-600",bg:"bg-gray-50 border-gray-200",emoji:"🤿"};
        }
    };
    const si=getStatusInfo();

    return(
        <div className="flex flex-col h-full p-3 gap-3 bg-slate-100">
            <div className="text-center mb-0">
                <h2 className="text-lg sm:text-xl font-semibold text-cyan-900 flex items-center justify-center gap-2 detective-font">
                    <Waves className="text-cyan-600"/> 파일 3: 생활 속 밀도 - 수심 15m 인증
                </h2>
                <p className="text-cyan-700 text-xs mt-1">💡 납 벨트 +/− 버튼을 누르면 잠수부가 <strong>즉시 움직여요!</strong></p>
            </div>

            <div className="flex flex-col lg:flex-row gap-3 h-full">
                {/* Ocean */}
                <div className="flex-1 rounded-2xl overflow-hidden relative shadow-2xl ocean-gradient border-4 border-slate-300" style={{minHeight:'400px'}}>
                    {showFlash&&<div className="absolute inset-0 bg-white z-50 opacity-90"></div>}
                    <div className="absolute top-0 left-0 w-full h-[15%]" style={{background:'linear-gradient(to bottom,#e0f2fe,#bae6fd)'}}></div>
                    <div className="absolute top-2 right-16 w-10 h-10 bg-yellow-300 rounded-full" style={{boxShadow:'0 0 20px 8px rgba(253,224,71,.4)'}}></div>
                    <div className="absolute top-2 left-20"><svg width="60" height="24"><ellipse cx="20" cy="14" rx="16" ry="8" fill="white" opacity=".8"/><ellipse cx="35" cy="12" rx="20" ry="10" fill="white" opacity=".8"/><ellipse cx="50" cy="14" rx="14" ry="7" fill="white" opacity=".8"/></svg></div>
                    <div className="absolute left-4 top-[3%] z-10"><SimpleShip/></div>
                    <div className="absolute right-[15%] top-[6%] z-10"><LifeJacketPerson/><div className="text-[9px] font-semibold text-white bg-orange-500 px-1.5 py-0.5 rounded-full text-center -mt-1 shadow">구명조끼</div></div>
                    <OceanWaves/>
                    <div className="absolute right-0 h-full w-9 bg-black bg-opacity-20 flex flex-col justify-between text-white text-[9px] font-mono text-center z-10" style={{paddingTop:'16%',paddingBottom:'4%'}}><span>0m</span><span>5m</span><span>10m</span><span className="text-yellow-300 font-semibold bg-yellow-900 bg-opacity-60 rounded px-0.5">15m</span><span>20m</span><span>25m</span><span>30m</span></div>
                    {/* 15m 목표선 */}
                    <div className={`absolute left-0 right-9 border-t-2 border-dashed z-5 ${at15m?'border-yellow-300':'border-yellow-400 opacity-50'}`} style={{top:'45%'}}>
                        {at15m&&<span className="absolute -top-3 left-2 text-yellow-300 text-[10px] font-semibold bg-yellow-900 bg-opacity-60 px-1 rounded">🎯 목표 도달!</span>}
                    </div>
                    <Bubbles count={8}/>
                    <Fish className="fish-anim" color="#f59e0b" y="55%"/>
                    <Fish className="fish-anim-2" color="#fb7185" y="75%"/>
                    <Seaweed x="10%" h={45}/><Seaweed x="25%" h={35}/><Seaweed x="70%" h={40}/><Seaweed x="85%" h={30}/>
                    <div className="absolute bottom-0 left-0 w-full h-5" style={{background:'linear-gradient(to bottom,#d4a574,#c2956a)'}}></div>
                    <div className="absolute left-1/2 transform -translate-x-1/2 diver-anim z-20" style={{top:`${depth}%`,marginTop:'-35px'}}><div className="gentle-bob"><RealisticDiver weightCount={weights}/></div></div>
                    {/* 카메라 셔터 효과 */}
                    {photoTaken&&!showFlash&&<div className="absolute top-2 left-2 bg-green-500 text-white px-2 py-1 rounded text-[10px] font-semibold z-30 fade-in">📸 인증샷 촬영 완료!</div>}
                </div>

                {/* Controls */}
                <div className="lg:w-72 bg-white p-4 rounded-2xl shadow-lg flex flex-col gap-3 border border-slate-200">
                    <div>
                        <h3 className="font-semibold text-slate-800 text-sm detective-font flex items-center gap-1"><Waves className="text-cyan-600" size={16}/> 잠수부 컨트롤</h3>
                        <p className="text-slate-500 text-[10px] mt-0.5"><strong>미션:</strong> 납 벨트로 <span className="text-amber-600 font-semibold">수심 15m</span>에 멈추기!</p>
                    </div>

                    {/* 납 벨트 컨트롤 */}
                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-200">
                        <h3 className="font-semibold text-center mb-2 text-slate-700 text-xs">⚖️ 납 벨트 수</h3>
                        <div className="flex items-center justify-between px-1">
                            <button onClick={()=>changeWeights(-1)} className="w-11 h-11 bg-white border-2 border-red-300 text-red-500 rounded-xl font-semibold text-xl shadow-sm hover:bg-red-50 active:scale-95">−</button>
                            <div className="text-center"><span className="text-4xl font-semibold text-slate-800">{weights}</span><div className="text-[9px] text-slate-400 font-semibold tracking-widest mt-0.5">개</div></div>
                            <button onClick={()=>changeWeights(1)} className="w-11 h-11 bg-white border-2 border-green-300 text-green-500 rounded-xl font-semibold text-xl shadow-sm hover:bg-green-50 active:scale-95">+</button>
                        </div>
                        <div className="flex justify-center gap-1 mt-2.5">
                            {[...Array(5)].map((_,i)=>
                                <button key={i} onClick={()=>setWeightsTo(i+1)} className={`w-5 h-3.5 rounded border transition-colors ${i<weights?'bg-slate-700 border-slate-800':'bg-gray-100 border-gray-300 hover:bg-gray-200'}`}></button>
                            )}
                        </div>
                        <p className="text-[9px] text-slate-400 mt-1 text-center">💡 + 누르면 가라앉고, − 누르면 떠올라요</p>
                    </div>

                    {/* 상태 메시지 */}
                    <div className={`p-2.5 rounded-xl border-2 text-xs transition-all ${si.bg} ${at15m?'clue-highlight':''}`}>
                        <p className={`font-semibold ${si.color} text-center`}>{si.emoji} {si.text}</p>
                    </div>

                    {/* 인증샷 버튼 */}
                    <button onClick={takePhoto} disabled={!at15m} className={`w-full font-semibold py-3 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 detective-font ${at15m?(photoTaken?'bg-green-600 text-white':'bg-amber-500 hover:bg-amber-600 text-white active:scale-95 animate-pulse'):'bg-gray-300 text-gray-500 cursor-not-allowed'}`}>
                        <Camera size={20}/> {photoTaken?'📸 인증샷 완료!':'15m 인증샷 찍기!'}
                    </button>

                    {/* 설명 */}
                    <div className="p-2.5 bg-slate-50 rounded-xl text-[10px] text-slate-600 border border-slate-200 leading-relaxed">
                        <p className="mb-1"><strong className="text-slate-800">🏊 잠수부</strong>: 납 허리띠로 평균 밀도를 ↑하여 가라앉음</p>
                        <p><strong className="text-slate-800">🦺 구명조끼</strong>: 부피 ↑로 평균 밀도를 ↓하여 떠오름</p>
                    </div>
                </div>
            </div>
        </div>
    );
};

/* ===== BRAG PAGE - 선생님께 자랑하기 ===== */

                        <div className="tape tape-tl"></div>
                        <div className="text-center">
                            <div className="text-4xl mb-1">{achievements.tower?'🍹':'🔒'}</div>
                            <h3 className="font-semibold text-purple-900 text-sm detective-font">밀도 음료 제조 자격증</h3>
                            <p className="text-[10px] text-gray-600 mt-1">밀도순으로 시럽을 쌓아 나만의 음료 완성</p>
                            {achievements.tower&&drinkData?(

/* ===== APP ===== */
const App=()=>{
    const{isMobile}=useViewport();
    const[activeTab,setActiveTab]=useState('experiment');
    const[achievements,setAchievements]=useState({explore:false,tower:false,diver:false});
    const[showBrag,setShowBrag]=useState(false);
    const[showInfo,setShowInfo]=useState(false);
    const[justAchieved,setJustAchieved]=useState(null);
    const[showConfetti,setShowConfetti]=useState(false);
    const[drinkData,setDrinkData]=useState(null);
    const[photoData,setPhotoData]=useState(null);
    const[studentName,setStudentName]=useState('');

    const handleAchieve=useCallback((key)=>{
        setAchievements(prev=>{
            if(prev[key])return prev;
            const next={...prev,[key]:true};
            setJustAchieved(key);
            setTimeout(()=>setJustAchieved(null),3000);
            const total=Object.values(next).filter(Boolean).length;
            if(total===3){
                setTimeout(()=>{setShowConfetti(true);setTimeout(()=>setShowConfetti(false),4500);SFX.play('fanfare')},500);
            }
            return next;
        });
    },[]);

    const achieveLabels={explore:'🔍 미지 물질 정체 파악!',tower:'🍹 밀도 음료 완성!',diver:'📸 15m 인증샷 성공!'};

    return(
        <div className="min-h-screen flex flex-col case-bg">
            {showConfetti&&<Confetti/>}
            {showBrag&&<BragPage achievements={achievements} drinkData={drinkData} photoData={photoData} onClose={()=>setShowBrag(false)} studentName={studentName} setStudentName={setStudentName}/>}
            {showInfo&&<InfoModal onClose={()=>setShowInfo(false)}/>}

            {justAchieved&&(
                <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 achievement-pop px-3">
                    <div className="bg-yellow-400 text-yellow-900 px-4 sm:px-6 py-3 rounded-2xl shadow-2xl font-semibold flex items-center gap-2 text-xs sm:text-sm detective-font">
                        <Trophy size={20}/>{achieveLabels[justAchieved]}
                    </div>
                </div>
            )}

            <div className="max-w-7xl w-full mx-auto shadow-2xl my-0 sm:my-4 bg-white sm:rounded-3xl overflow-hidden flex flex-col flex-1">
                <header className="bg-gradient-to-r from-slate-800 via-slate-900 to-slate-800 text-white p-3 flex flex-col sm:flex-row justify-between items-center z-20 gap-2 border-b-4 border-amber-500 relative">
                    {/* 배경 장식 */}
                    <div className="absolute top-1 right-1/4 text-3xl opacity-10 spotlight">🔍</div>
                    <div className="flex items-center gap-2 z-10">
                        <div className="bg-amber-500 p-1.5 rounded-lg shadow-md"><Magnify className="text-slate-900" size={20}/></div>
                        <div>
                            <h1 className="text-sm sm:text-base font-semibold tracking-tight detective-font leading-tight">🕵️ 밀도 탐정 사건 파일</h1>
                            <p className="text-[9px] sm:text-[10px] text-amber-200">I. 물질의 특성 - 1. 밀도 탐정</p>
                        </div>
                        <button onClick={()=>{SFX.play('click');setShowInfo(true)}} className="ml-0.5 bg-slate-700 hover:bg-slate-600 p-1 rounded-full" title="앱 정보">
                            <InfoIcon size={14} className="text-slate-300"/>
                        </button>
                    </div>
                    <div className="flex flex-col sm:flex-row items-center gap-2 z-10 w-full sm:w-auto">
                        <AchievementBar achievements={achievements} onShowBrag={()=>{SFX.play('click');setShowBrag(true)}} isMobile={isMobile}/>
                    </div>
                </header>

                {/* 탭 네비게이션 */}
                <nav className="bg-slate-900 px-2 py-1.5 flex gap-1 overflow-x-auto">
                    {[
                        {key:'experiment',label:'1. 미지의 금속 정체 찾기',short:'1. 미지 금속',activeClass:'bg-amber-500 text-white shadow-lg ring-2 ring-amber-300',icon:'🔍'},
                        {key:'tower',label:'2. 간이 밀도탑 (음료)',short:'2. 밀도탑',activeClass:'bg-purple-500 text-white shadow-lg ring-2 ring-purple-300',icon:'🍹'},
                        {key:'diver',label:'3. 생활 속 밀도 (잠수)',short:'3. 잠수',activeClass:'bg-cyan-500 text-white shadow-lg ring-2 ring-cyan-300',icon:'🤿'}
                    ].map(t=>(
                        <button key={t.key} onClick={()=>{SFX.play('click');setActiveTab(t.key)}} className={`px-3 py-1.5 rounded-md text-[11px] sm:text-xs font-semibold transition-all whitespace-nowrap flex-shrink-0 detective-font ${activeTab===t.key?t.activeClass:'text-gray-300 hover:bg-slate-700'}`}>
                            <span className="mr-1">{t.icon}</span>{isMobile?t.short:t.label}
                        </button>
                    ))}
                </nav>

                <main className="flex-1 bg-gradient-to-br from-gray-50 to-amber-50 overflow-y-auto" style={{minHeight:'500px'}}>
                    {activeTab==='experiment'&&<ExperimentLab onAchieve={handleAchieve} isMobile={isMobile}/>}
                    {activeTab==='tower'&&<DensityTower onAchieve={handleAchieve} onSaveDrink={setDrinkData}/>}
                    {activeTab==='diver'&&<DiverGame onAchieve={handleAchieve} onSavePhoto={setPhotoData}/>}
                </main>

                <footer className="bg-slate-900 text-slate-300 p-2.5 text-center text-[10px] sm:text-xs border-t-2 border-amber-500">
                    <div className="font-medium detective-font">🔍 © 2026 과학이조선생(조승재). All rights reserved.</div>
                    <div className="text-slate-500 mt-0.5">밀도 탐정 사건 파일 v4.0 · Last updated : 2026-05-11</div>
                </footer>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// 로딩 화면 숨김
setTimeout(()=>{
    const ls=document.getElementById('loading-screen');
    if(ls)ls.classList.add('hidden');
    setTimeout(()=>{if(ls)ls.style.display='none'},600);
},100);

// 페이지 닫기 경고
window.addEventListener('beforeunload',(e)=>{
    e.preventDefault();
    e.returnValue='실험을 종료하시겠습니까? 진행 상황이 저장되지 않을 수 있습니다.';
    return e.returnValue;
});
</script>
</body>
</html>
